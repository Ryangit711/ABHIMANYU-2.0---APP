location_filter:
  # HARD RULE: In-person = Greater Vancouver Area only.
  # Remote Canada only — US/international remote rejected.
  # always_allow: specific GVA cities + BC (unblockable)
  # allow: Richmond/Surrey (moved here to avoid false positives like Richmond VA)
  #        + Remote + Canada (for "Canada Remote" and "Remote Canada" formats)
  # block: non-BC provinces + US + international
  always_allow:
    - "Vancouver"
    - "Burnaby"
    - "Coquitlam"
    - "Delta"
    - "Langley"
    - "North Vancouver"
    - "West Vancouver"
    - "New Westminster"
    - "Port Moody"
    - "Port Coquitlam"
    - "British Columbia"
    - "BC"
  allow:
    # GVA cities that could also match non-BC locations
    - "Richmond"
    - "Surrey"
    # Remote + Canada keywords (block-checked first, so US-only remotes get blocked)
    - "Remote"
    - "remote"
    - "Canada"
    - "canada"
  block:
    # Non-BC Canadian provinces (rejected unconditionally)
    - "Ontario"
    - "Toronto"
    - "Mississauga"
    - "Brampton"
    - "Hamilton"
    - "Ottawa"
    - "Kitchener"
    - "Waterloo"
    - "Quebec"
    - "Montreal"
    - "Montréal"
    - "Quebec City"
    - "Alberta"
    - "Calgary"
    - "Edmonton"
    - "Manitoba"
    - "Winnipeg"
    - "Saskatchewan"
    - "Saskatoon"
    - "Regina"
    - "Nova Scotia"
    - "Halifax"
    - "New Brunswick"
    - "PEI"
    - "Newfoundland"
    - "St. John's"
    - "Yukon"
    - "Whitehorse"
    - "Northwest Territories"
    - "Yellowknife"
    - "Nunavut"
    # United States (reject all US-only roles)
