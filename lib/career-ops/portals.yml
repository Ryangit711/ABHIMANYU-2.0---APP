# Portal Scanner Configuration — ABHIMANYU 2.0
# Targets: $120K+, Vancouver/Remote Canada, TEER 0/1, Ops/Strategy roles
# See templates/portals.example.yml for full reference
#
# ATS providers supported by SCAN (45 total):
#   greenhouse, ashby, lever, workday, successfactors, smartrecruiters,
#   bamboohr, breezy, personio, recruitee, teamtailor, workable, rippling,
#   jibeapply, avature, pinpoint, amazon, ibm, comeet, + job boards
#
# Companies using unsupported ATS (Taleo, iCIMS, custom):
#   These stay as generic career URLs — discovered via manual FETCH only

title_filter:
  # BROAD: Don't rely on specific title keywords — roles can be named anything.
  # If a title suggests leadership, management, ops, strategy, consulting,
  # advisory, or senior IC work, it passes. The negative list removes clearly
  # wrong roles (engineering, finance, healthcare licensure, admin, sales).
  positive:
    # Operations & Strategy (core)
    - "operations"
    - "strategy"
    - "strategic"
    - "operational"
    # Leadership & General Management
    - "director"
    - "head of"
    - "vice president"
    - "vp "
    - "president"
    - "chief "
    - "senior manager"
    - "manager"
    - "lead"
    - "principal"
    - "partner"
    # Consulting & Advisory
    - "consultant"
    - "consulting"
    - "advisor"
    - "advisory"
    # Program & Project Management
    - "program"
    - "project"
    - "portfolio"
    - "delivery"
    # Growth & Development
    - "growth"
    - "business development"
    - "corporate development"
    - "bd "
    # Transformation & Change
    - "transformation"
    - "change"
    - "turnaround"
    - "restructuring"
    - "value creation"
    # M&A & Integration
    - "m&a"
    - "merger"
    - "acquisition"
    - "integration"
    - "due diligence"
    # Practice & Engagement (consulting)
    - "practice"
    - "engagement"
    - "scoping"
    # Architecture (non-technical)
    - "architect"
    # Excellence & Quality (ops)
    - "excellence"
    - "quality"
    # Process & Optimization
    - "process"
    - "optimization"
    - "scaling"
    # Innovation & Ventures
    - "innovation"
    - "venture"
    - "launch"
    # Product-adjacent (ops/strategy side)
    - "product operations"
    - "product strategy"
    - "product management"
    # Marketing Operations
    - "marketing operations"
    - "marketing strategy"
    - "growth marketing"
    # People & Talent (senior only)
    - "people operations"
    - "talent operations"
    # Executive & Founder-adjacent
    - "coo"
    - "chief of staff"
    - "general manager"
    - "gm "
    # Revenue & Commercial
    - "revenue"
    - "commercial"
    # Senior IC titles
    - "senior associate"
    - "manager,"
  negative:
