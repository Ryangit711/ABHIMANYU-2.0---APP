content_filter:
  # Checks JD description text when provider returns it in list payload
  # (Lever, some Ashby — Greenhouse/Workday/SuccessFactors don't).
  # Empty descriptions always pass; this catches title-blind roles.
  positive:
    - "operations"
    - "strategy"
    - "strategic"
    - "operational"
    - "transformation"
    - "cross-functional"
    - "business operations"
